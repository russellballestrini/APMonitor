user www-data;
pid /var/www/html/apmonitor-nginx.pid;
daemon on;

# apt install fcgiwrap nginx
# /sbin/nginx -p . -c nginx.conf
# chmod 777 /var/run/fcgiwrap.socket

events {
    # Event context settings
}

http {
    server {
        listen 888;

        root /var/www/html/mrtg;
        index index.html;

        # Enable directory listings for browsing MRTG output
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        location / {
            # Serve static MRTG files
            try_files $uri $uri/ =404;
        }

        # MRTG-RRD FastCGI handler for /mrtg-rrd (without .cgi extension)
        location ~ ^/mrtg-rrd(/.*)?$ {
            fastcgi_pass unix:/var/run/fcgiwrap.socket;
            fastcgi_param SCRIPT_FILENAME /var/www/html/mrtg/mrtg-rrd.cgi.pl;
            fastcgi_param SCRIPT_NAME /mrtg-rrd;
            fastcgi_param PATH_INFO $1;
            fastcgi_param QUERY_STRING $query_string;
            fastcgi_param REQUEST_METHOD $request_method;
        }

        # Cache MRTG graphs
        location ~* \.(png|gif|html)$ {
            expires 5m;
            add_header Cache-Control "public, must-revalidate";
        }

        # Optional: Basic auth for security
        # auth_basic "Monitoring";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }
}